<!DOCTYPE html>
<html>
<head>
    <title>Sonic Chaos: Creator Edition</title>
    <style>
        :root { --sonic: #0044ff; --gold: #f1c40f; --emerald: #2ed573; --chaos: #a335ee; --eggman: #ff4757; --shadow: #222; --garden: #2ecc71; --dev: #00fff2; }
        body { background: #05080a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow: hidden; user-select: none; }
        #dev-badge { position: fixed; top: 10px; left: 10px; background: rgba(0,255,242,0.1); border: 1px solid var(--dev); color: var(--dev); padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; box-shadow: 0 0 10px var(--dev); }
        .hud { height: 25vh; background: linear-gradient(#001a33, #05080a); display: flex; flex-direction: column; justify-content: center; border-bottom: 3px solid var(--sonic); }
        #r-text { font-size: 55px; color: var(--gold); font-weight: 900; text-shadow: 0 0 15px orange; }
        .tab-bar { background: #111; padding: 10px; display: flex; justify-content: center; gap: 8px; }
        .tab-btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; font-size: 12px; }
        .panel { height: 60vh; overflow-y: auto; background: #111; padding: 20px; display: none; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; max-width: 1100px; margin: auto; padding-bottom: 50px; }
        .up-card { background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 10px; display: flex; align-items: center; gap: 10px; text-align: left; }
        .up-card .icon { font-size: 35px; width: 45px; text-align: center; }
        .up-card button { width: 100%; margin-top: 5px; background: var(--sonic); color: white; border: none; padding: 6px; border-radius: 4px; cursor: pointer; }
        #admin-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #181818; border: 1px solid #444; box-shadow: 0 0 50px #000; display: none; z-index: 10000; border-radius: 5px; width: 480px; height: 350px; overflow: hidden; }
        .admin-header { background: #222; padding: 8px 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; font-size: 11px; }
        .admin-main { display: flex; height: 275px; }
        .admin-sidebar { width: 110px; background: #121212; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .admin-sidebar button { background: none; border: none; color: #777; padding: 12px; text-align: left; cursor: pointer; font-size: 12px; }
        .admin-content { flex-grow: 1; padding: 20px; overflow-y: auto; text-align: left; }
        .admin-content button { width: 100%; padding: 10px; margin-bottom: 10px; background: #252525; color: white; border: 1px solid #333; cursor: pointer; }
        #sonic-btn { font-size: 90px; background: none; border: none; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 0 10px var(--sonic)); }
        #sonic-btn:active { transform: scale(0.8); }
        .frozen { filter: grayscale(1) brightness(0.7) sepia(1) hue-rotate(180deg) !important; }
    </style>
</head>
<body>
    <div id="dev-badge">CREATOR ACCESS: GRANTED</div>
    <div id="boss-ui" style="background:#200; padding:10px; display:none; border-bottom:3px solid var(--eggman);">
        <h3 style="margin:0; color:var(--eggman);">DR. EGGMAN INVASION</h3>
        <div style="width:80%; height:10px; background:#111; margin:8px auto; border-radius:10px; overflow:hidden;"><div id="hp-fill" style="width:100%; height:100%; background:var(--eggman); transition:0.1s;"></div></div>
        <small>HP: <span id="b-hp-text">0</span> | TIME: <span id="b-timer">20</span>s</small>
    </div>
    <div class="hud">
        <div id="r-text">0</div>
        <div style="font-size:12px; color:#58a6ff;">RPS: <span id="rps-display">0</span> | MULTI: <span id="m-display">1.0</span>x</div>
        <button id="sonic-btn">🌀</button>
    </div>
    <div class="tab-bar">
        <button class="tab-btn" style="background:var(--sonic)" onclick="showTab('shop-panel')">SHOP</button>
        <button class="tab-btn" style="background:var(--garden)" onclick="showTab('garden-panel')">GARDEN</button>
        <button class="tab-btn" style="background:var(--shadow)" onclick="toggleShadow()">SHADOW</button>
        <button class="tab-btn" style="background:var(--eggman)" onclick="startBoss()">BOSS</button>
    </div>
    <div id="shop-panel" class="panel active"><div class="grid" id="shop-grid"></div></div>
    <div id="garden-panel" class="panel" style="background:linear-gradient(#87ceeb, #2ecc71); color:#222;">
        <h2>CHAO GARDEN</h2>
        <div id="egg-area"><div style="font-size:100px; cursor:pointer;" onclick="hatch()">🥚</div><p>Hatch Egg (500 Rings)</p></div>
        <div id="chao-area" style="display:none;"><div id="chao-sprite" style="font-size:90px; animation:bounce 2s infinite; cursor:pointer;" onclick="petChao()">👶</div><h3>Neutral Chao (Lvl <span id="chao-lvl">1</span>)</h3><p>Bonus: +<span id="chao-bonus">0</span>%</p><button onclick="petChao()">FEED CHAOS DRIVE</button></div>
    </div>
    <div id="admin-panel">
        <div class="admin-header"><span>ADONIS ADMIN</span><span onclick="toggleAdmin()">[X]</span></div>
        <div class="admin-main">
            <div class="admin-sidebar"><button onclick="adminTab('a-main')">Stats</button><button onclick="adminTab('a-world')">World</button></div>
            <div class="admin-content"><div id="a-main" class="atab"><button onclick="adminAdd(1000000)">+1M Rings</button><button onclick="adminPower()">+1M Power</button></div><div id="a-world" class="atab" style="display:none;"><button onclick="adminChaos()">Chaos Control</button><button onclick="fullReset()">Wipe Save</button></div></div>
        </div>
    </div>
    <script>
        let d = JSON.parse(localStorage.getItem('SonicFinalBuild')) || { rings: 0, power: 1, rps: 0, chaoLvl: 1, hatched: false, owned: new Array(21).fill(0) };
        const upgrades = [
            { name: "Shoes", icon: "👟", cost: 10, val: 1, type: 'c' }, { name: "Baby Chao", icon: "🍼", cost: 15, val: 1, type: 'a' },
            { name: "Tails Gear", icon: "🔧", cost: 100, val: 5, type: 'c' }, { name: "Hire Tails", icon: "🦊", cost: 250, val: 10, type: 'a' },
            { name: "Knuckles", icon: "🤜", cost: 2500, val: 50, type: 'a' }, { name: "Hammer", icon: "🔨", cost: 10000, val: 100, type: 'c' },
            { name: "Hire Amy", icon: "👗", cost: 25000, val: 250, type: 'a' }, { name: "Emerald", icon: "💎", cost: 100000, val: 500, type: 'c' },
            { name: "Hire Shadow", icon: "🌑", cost: 250000, val: 1200, type: 'a' }, { name: "Air Shoes", icon: "💨", cost: 1000000, val: 5000, type: 'c' },
            { name: "Hire Silver", icon: "⏳", cost: 2500000, val: 15000, type: 'a' }, { name: "Blaze Fuel", icon: "🔥", cost: 10000000, val: 50000, type: 'c' },
            { name: "Hire Blaze", icon: "🐯", cost: 25000000, val: 200000, type: 'a' }, { name: "Wisps", icon: "🌈", cost: 100000000, val: 500000, type: 'c' },
            { name: "Team Dark", icon: "🦇", cost: 500000000, val: 2000000, type: 'a' }, { name: "Omega", icon: "🤖", cost: 1000000000, val: 10000000, type: 'a' },
            { name: "World Ring", icon: "💍", cost: 5000000000, val: 50000000, type: 'c' }, { name: "Super Sonic", icon: "🌟", cost: 20000000000, val: 500000000, type: 'a' },
            { name: "Hyper Sonic", icon: "✨", cost: 100000000000, val: 1000000000, type: 'c' }, { name: "Metal Sonic", icon: "⚙️", cost: 500000000000, val: 5000000000, type: 'a' },
            { name: "Master Emerald", icon: "🟢", cost: 1000000000000, val: 25000000000, type: 'a' }
        ];
        let bossActive = false, bossHP = 0, maxHP = 0, bTimer = 20, shadowMode = false, chaosMode = false;
        const isFriday = new Date().getDay() === 5;
        document.getElementById('sonic-btn').onclick = () => {
            let mult = (isFriday ? 5 : 1) * (1 + (d.chaoLvl * 0.1)) * (shadowMode ? 20 : 1) * (chaosMode ? 100 : 1);
            if (bossActive) { bossHP -= d.power * mult; if(bossHP <= 0) winBoss(); } else { d.rings += d.power * mult; }
            updateUI();
        };
        function buy(i) {
            let cost = Math.floor(upgrades[i].cost * Math.pow(1.5, d.owned[i]));
            if (d.rings >= cost) { d.rings -= cost; d.owned[i]++; if (upgrades[i].type === 'c') d.power += upgrades[i].val; else d.rps += upgrades[i].val; renderShop(); updateUI(); }
        }
        function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'none' ? 'block' : 'none'; }
        function adminTab(id) { document.querySelectorAll('.atab').forEach(t => t.style.display = 'none'); document.getElementById(id).style.display = 'block'; }
        function adminAdd(n) { d.rings += n; updateUI(); }
        function adminPower() { d.power += 1000000; updateUI(); }
        function adminChaos() { chaosMode = true; document.body.classList.add('frozen'); setTimeout(()=> { chaosMode=false; document.body.classList.remove('frozen'); }, 10000); }
        window.addEventListener('keydown', (e) => { if (e.shiftKey && e.key.toLowerCase() === 'z') toggleAdmin(); });
        function startBoss() { if (bossActive) return; bossActive = true; bTimer = 20; maxHP = 1000 + (d.power * 200); bossHP = maxHP; document.getElementById('boss-ui').style.display = 'block'; }
        function winBoss() { bossActive = false; d.rings += maxHP * 3; document.getElementById('boss-ui').style.display = 'none'; }
        function toggleShadow() { shadowMode = !shadowMode; document.getElementById('sonic-btn').style.filter = shadowMode ? "grayscale(1) drop-shadow(0 0 20px red)" : "drop-shadow(0 0 10px var(--sonic))"; }
        function hatch() { if (d.rings >= 500) { d.rings -= 500; d.hatched = true; updateUI(); } }
        function petChao() { d.chaoLvl++; updateUI(); }
        function showTab(id) { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function renderShop() { document.getElementById('shop-grid').innerHTML = upgrades.map((u, i) => { let cost = Math.floor(u.cost * Math.pow(1.5, d.owned[i])); return `<div class="up-card"><div class="icon">${u.icon}</div><div class="details"><b>${u.name}</b> (${d.owned[i]})<br><span>🟡 ${cost.toLocaleString()}</span><button id="b-${i}" onclick="buy(${i})">BUY</button></div></div>`; }).join(''); }
        function updateUI() {
            document.getElementById('r-text').innerText = Math.floor(d.rings).toLocaleString();
            document.getElementById('rps-display').innerText = Math.floor(d.rps * (isFriday?5:1) * (shadowMode?20:1)).toLocaleString();
            document.getElementById('m-display').innerText = ((isFriday?5:1) * (1+(d.chaoLvl*0.1)) * (shadowMode?20:1)).toFixed(1);
            if (d.hatched) { document.getElementById('egg-area').style.display = 'none'; document.getElementById('chao-area').style.display = 'block'; document.getElementById('chao-lvl').innerText = d.chaoLvl; document.getElementById('chao-bonus').innerText = d.chaoLvl * 10; }
            document.getElementById('hp-fill').style.width = (bossHP/maxHP*100)+"%";
            document.getElementById('b-hp-text').innerText = Math.floor(bossHP).toLocaleString();
            document.getElementById('b-timer').innerText = bTimer;
            upgrades.forEach((u, i) => { let btn = document.getElementById('b-'+i); if(btn) btn.disabled = d.rings < Math.floor(u.cost * Math.pow(1.5, d.owned[i])); });
        }
        function fullReset() { localStorage.clear(); location.reload(); }
        setInterval(() => {
            let mult = (isFriday ? 5 : 1) * (1 + (d.chaoLvl * 0.1)) * (shadowMode ? 20 : 1);
            if (bossActive) { bossHP -= d.rps * mult; bTimer--; if (bTimer <= 0) { bossActive = false; document.getElementById('boss-ui').style.display = 'none'; } if (bossHP <= 0) winBoss(); } else { d.rings += d.rps * mult; }
            if (shadowMode && d.rings > 0) d.rings -= 10;
            localStorage.setItem('SonicFinalBuild', JSON.stringify(d)); updateUI();
        }, 1000);
        renderShop(); updateUI();
    </script>
</body>
</html>
